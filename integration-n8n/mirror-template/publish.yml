# Publishes n8n-nodes-tollara to npm with provenance.
#
# This file lives in the dedicated mirror repo (tollara/n8n-nodes-tollara) at
# .github/workflows/publish.yml. It is generated/synced from the tollara-sdk
# monorepo (integration-n8n/mirror-template/publish.yml) — edit it there.
#
# The package (package.json + built dist/) sits at this repo's ROOT so the n8n
# Creator Portal can locate it. dist/ is prebuilt by the monorepo sync workflow,
# so no build step is needed here.
#
# npm Trusted Publisher (one-time, on npmjs.com for package n8n-nodes-tollara):
#   Repository: tollara/n8n-nodes-tollara
#   Workflow filename: publish.yml
name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish n8n-nodes-tollara to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      # Node 24 bundles npm >= 11.5.1, which supports OIDC trusted publishing and
      # provenance out of the box. Do NOT `npm install -g npm@latest` — the in-place
      # self-upgrade intermittently breaks provenance with "Cannot find module 'sigstore'".
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NPM_CONFIG_PROVENANCE: 'true'
