services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: tollara-n8n-dev
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=Europe/London
      - TZ=Europe/London
      # Community nodes (self-hosted: unverified npm packages allowed)
      - N8N_COMMUNITY_PACKAGES_ENABLED=true
      - N8N_UNVERIFIED_PACKAGES_ENABLED=true
      - N8N_VERIFIED_PACKAGES_ENABLED=true
      # Do NOT set N8N_COMMUNITY_PACKAGES_MANAGED_BY_ENV here — it reinstalls from npm on
      # every startup and overwrites local tarball / bind-mount installs.
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n
      # Local dev: mount built integration-n8n (run npm run build on host before/up via start.ps1)
      - ../:/home/node/.n8n/nodes/node_modules/n8n-nodes-tollara
      # file:../sdk-js dependency resolves outside integration-n8n on the host; mount sdk-js too
      - ../../sdk-js:/home/node/.n8n/nodes/node_modules/n8n-nodes-tollara/node_modules/@tollara/service-sdk

volumes:
  n8n_data:
