# Publishes n8n-nodes-tollara to npm on version tag push (monorepo: integration-n8n).
#
# Tag convention: n8n-nodes-tollara-v0.0.4 (set by `npm run release` in integration-n8n).
#
# npm Trusted Publisher setup (one-time):
#   Package: n8n-nodes-tollara
#   Repository: tollara/tollara-sdk
#   Workflow filename: publish.yml
#
# Provenance requires the GitHub source repo to be public. Private repos fail with npm 422.
#
# See integration-n8n/LOCAL-DEVELOPMENT.md for release steps.

name: Publish

on:
  push:
    tags:
      - 'n8n-nodes-tollara-v*'

jobs:
  publish:
    name: Publish n8n-nodes-tollara to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integration-n8n

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: integration-n8n/package-lock.json

      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: npm run release
        env:
          NPM_CONFIG_PROVENANCE: 'true'
