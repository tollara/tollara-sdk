name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  sdk-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk-js/package-lock.json
      - run: cd sdk-js && npm ci && npm run build && npm test

  integration-n8n:
    runs-on: ubuntu-latest
    needs: [sdk-js]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: cd sdk-js && npm ci && npm run build
      - run: cd integration-n8n && npm ci && npm run build

  integration-openclaw:
    runs-on: ubuntu-latest
    needs: [sdk-js]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: cd sdk-js && npm ci && npm run build
      - run: cd integration-openclaw && npm ci && npm run build

  sdk-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build
        uses: gradle/actions/gradle-build-action@v4
        with:
          arguments: build --no-daemon
          build-root-directory: sdk-java
    continue-on-error: true

  sdk-dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: cd sdk-dotnet && dotnet test AgentVend.AgentSdk.Tests/AgentVend.AgentSdk.Tests.csproj
    continue-on-error: true

  sdk-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: cd sdk-python && pip install -e ".[dev]" && python -m pytest
    continue-on-error: true

  sdk-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - run: cd sdk-go && go build ./...
    continue-on-error: true

  sdk-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cd sdk-rust && cargo test && cargo test --features http
    continue-on-error: true
