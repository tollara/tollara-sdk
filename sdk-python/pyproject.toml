[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "marketplace-agent-sdk"
version = "1.0.0"
description = "Agent Hub SDK - verify HMAC, validate keys, report usage, progress, completion"
readme = "README.md"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
http = ["requests"]
dev = ["pytest", "requests"]

[tool.setuptools.packages.find]
where = ["src"]
